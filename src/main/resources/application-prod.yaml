server:
  port: ${SERVICE_PORT}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
      fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_NAME}
    non-secure-port: 8080
    non-secure-port-enabled: true
    secure-port-enabled: false
    prefer-ip-address: false
spring:
  application:
    name: record-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/tripmate
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: record_db
  cloud:
    aws:
      region:
        static: ${AWS_S3_REGION}
      s3:
        bucket: ${AWS_S3_BUCKET}
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      access: unrestricted

